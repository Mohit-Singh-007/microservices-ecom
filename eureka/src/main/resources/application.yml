spring:
  application:
    name: eureka

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    enable-self-preservation: true
    evicted-interval-time-in-ms: 60*1000
    expected-client-renewal-interval-seconds: 30
  instance:
    prefer-ip-address: false # change later to true
    instance-id: auto-generated

server:
  port: 8761
