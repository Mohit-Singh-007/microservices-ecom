spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
        - id: product-service
          uri: lb://PRODUCT
          predicates:
            - Path=/api/products/**,/api/category/**,/api/category./api/products
        - id: cart-service
          uri: lb://CART
          predicates:
              - Path=/api/cart,/api/cart/**


eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

    register-with-eureka: true
    fetch-registry: true

  instance:
    hostname: localhost
    instance-id: localhost:${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

server:
  port: 8080
